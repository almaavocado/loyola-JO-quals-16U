<style>
/* ── Base ── */
html,body{margin:0;padding:0;background:#EEF2F8;font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased}

/* ── Page wrapper ── */
.lp-page{max-width:480px;margin:0 auto;padding:16px;min-height:100vh;box-sizing:border-box}

/* ── CSS variables ── */
:root{
  --border-radius-lg:20px;
  --border-radius-md:14px;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f1f5f9;
  --color-background-info:#eff6ff;
  --color-background-success:#f0fdf4;
  --color-background-danger:#fef2f2;
  --color-background-warning:#fffbeb;
  --color-border-tertiary:#e2e8f0;
  --color-border-secondary:#cbd5e1;
  --color-border-info:#bfdbfe;
  --color-border-success:#86efac;
  --color-border-danger:#fca5a5;
  --color-border-warning:#fde68a;
  --color-text-primary:#0f172a;
  --color-text-secondary:#64748b;
  --color-text-info:#1d4ed8;
  --color-text-success:#15803d;
  --color-text-danger:#b91c1c;
  --color-text-warning:#92400e;
}

/* ── Header ── */
.lp-hdr{
  background:linear-gradient(145deg,#0c1e4a 0%,#1a3a8a 55%,#0e2660 100%);
  border-radius:24px;
  padding:22px 20px;
  margin:0 0 14px;
  position:relative;
  overflow:hidden;
  box-shadow:0 8px 32px rgba(12,30,74,.35),0 2px 8px rgba(12,30,74,.2);
}
.lp-hdr::before{
  content:'';position:absolute;top:-60px;right:-40px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(255,255,255,0.05);pointer-events:none;
}
.lp-hdr::after{
  content:'';position:absolute;bottom:-80px;left:25%;
  width:240px;height:240px;border-radius:50%;
  background:rgba(59,130,246,0.08);pointer-events:none;
}
.lp-hdr-top{display:flex;align-items:center;gap:16px;position:relative}
.lp-logo{
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.22);
  padding:6px;object-fit:contain;flex-shrink:0;
  box-shadow:0 0 0 5px rgba(255,255,255,0.06),0 8px 24px rgba(0,0,0,0.3);
  backdrop-filter:blur(4px);
}
.lp-chip-head{
  display:inline-flex;align-items:center;
  padding:3px 11px;
  background:rgba(251,191,36,0.18);
  color:#FCD34D;
  border:1px solid rgba(251,191,36,0.35);
  border-radius:999px;
  font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  margin-bottom:7px;
}
.lp-hdr h1{margin:0;font-size:26px;font-weight:800;color:#fff;line-height:1.1}
.lp-hdr h1 span{display:block;font-size:14px;font-weight:500;color:rgba(147,197,253,.85);margin-top:4px}
.lp-hdr p{margin:10px 0 0;font-size:12.5px;color:rgba(186,230,253,.65);line-height:1.5;position:relative}

/* ── Tabs ── */
.lp-tabs{display:flex;gap:10px;margin:0 0 14px}
.lp-tab{
  flex:1;padding:13px 10px;border-radius:16px;
  font-size:13px;font-weight:600;
  border:1.5px solid #e2e8f0;
  background:white;color:#64748b;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:7px;
  box-shadow:0 1px 4px rgba(0,0,0,0.07);
  font-family:'Inter',sans-serif;
}
.lp-tab.aw{
  background:linear-gradient(135deg,#f0fdf4,#dcfce7);
  color:#2a9651;border-color:#86efac;
  box-shadow:0 2px 10px rgba(21,128,61,.18);
}
.lp-tab.al{
  background:linear-gradient(135deg,#fef2f2,#fee2e2);
  color:#b91c1c;border-color:#fca5a5;
  box-shadow:0 2px 10px rgba(185,28,28,.15);
}

/* ── Path visibility ── */
.lp-path{display:none}
.lp-path.on{display:block}

/* ── Badge (Game #11 result at top) ── */
.lp-badge{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-radius:18px;margin:0 0 14px;
  border:none;
}
.lp-badge.bw{
  background:linear-gradient(145deg,#f0fdf4,#dcfce7);
  box-shadow:0 4px 16px rgba(5,150,105,.2);
}
.lp-badge.bl{
  background:linear-gradient(135deg,#fee2e2,#fecaca);
  box-shadow:0 4px 16px rgba(185,28,28,.15);
}
.lp-bico{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:20px;font-weight:700;
}
.bw .lp-bico{background:rgba(5,150,105,.4);color:#fff}
.bl .lp-bico{background:rgba(185,28,28,.3);color:#fff}
.lp-badge h3{font-size:14px;font-weight:700;margin:0 0 2px;color:#0f172a}
.lp-badge a{color:inherit;text-decoration:underline;text-underline-offset:2px;text-decoration-style:dashed;font-weight:600}
.lp-badge a:hover{text-decoration-style:solid}
.lp-badge p{font-size:12px;color:#475569;margin:0}

/* ── Card stack ── */
.lp-stk{display:flex;flex-direction:column;gap:12px}

/* ── Game cards ── */
.lp-card{
  background:white;border-radius:20px;border:none;
  padding:16px 18px;
  box-shadow:0 2px 12px rgba(15,23,42,.07),0 1px 3px rgba(15,23,42,.04);
}
.lp-card.dw{
  background:linear-gradient(145deg,#f0fdf4,#dcfce7);
  box-shadow:0 2px 10px rgba(21,128,61,.1);
}
.lp-card.dl{
  background:linear-gradient(145deg,#fef2f2,#fee2e2);
  box-shadow:0 2px 10px rgba(185,28,28,.08);
}
.lp-card.dw{background:linear-gradient(145deg,#f0fdf4,#dcfce7);border:none;}
.lp-card.dl{background:linear-gradient(145deg,#fef2f2,#fee2e2);border:none;}
.lp-card.ac{
  border:2px solid #a5b4fc;
  box-shadow:0 4px 20px rgba(99,102,241,.15),0 1px 3px rgba(99,102,241,.08);
}
@keyframes lpin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.lp-card.rv,.lp-out.rv{animation:lpin .25s ease}

/* ── Card internals ── */
.lp-ctop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:0 0 10px}
.lp-gnum{
  font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;
  background:#eef2ff;color:#4338ca;white-space:nowrap;letter-spacing:.03em;
}
.lp-gcmt{font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.lp-teams{font-size:17px;font-weight:700;color:#0f172a;margin:0 0 3px;line-height:1.3}
.lp-vs{color:#94a3b8;font-weight:400;font-size:14px}
.lp-note{font-size:12px;color:#64748b;margin:0 0 10px}
.lp-meta{display:flex;flex-direction:row;flex-wrap:wrap;gap:6px 16px;margin:0 0 14px;align-items:center}
.lp-meta span{font-size:12px;color:#64748b;display:flex;align-items:center;gap:6px}
.lp-meta a{color:#2563eb;text-decoration:underline;text-underline-offset:2px;text-decoration-style:dashed;font-size:12px;font-weight:500}
.lp-meta a:hover{text-decoration-style:solid}
.lp-meta i{font-size:14px;flex-shrink:0;color:#94a3b8}.lp-meta span:last-child i{color:#2563eb}

/* ── Win / Lose buttons ── */
.lp-btns{display:flex;gap:10px}
.lpbw,.lpbl{
  flex:1;padding:13px 10px;border-radius:14px;
  font-size:15px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .15s;border:none;
  font-family:'Inter',sans-serif;letter-spacing:.01em;
}
.lpbw{
  background:#f0fdf4;
  color:#166534;
  border:2px solid #86efac;
  box-shadow:0 2px 10px rgba(134,239,172,.35);
}
.lpbl{
  background:#fff1f2;
  color:#9f1239;
  border:2px solid #fda4af;
  box-shadow:0 2px 10px rgba(253,164,175,.35);
}
.lpbw:hover{background:#dcfce7;border-color:#4ade80;transform:translateY(-1px);box-shadow:0 4px 14px rgba(74,222,128,.35)}
.lpbl:hover{background:#ffe4e6;border-color:#fb7185;transform:translateY(-1px);box-shadow:0 4px 14px rgba(251,113,133,.35)}
.lpbw:active,.lpbl:active{transform:translateY(0)}

/* ── Won/Lost chip on history cards ── */
.lp-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:4px 12px;border-radius:999px;margin-top:2px}
.lp-chip.cw{background:rgba(21,128,61,.12);color:#15803d}
.lp-chip.cl{background:rgba(185,28,28,.12);color:#b91c1c}

/* ── Result card ── */
.lp-out{border-radius:24px;border:none;padding:30px 20px 22px;text-align:center}
.lp-out.og{background:linear-gradient(145deg,#fffbeb,#fef3c7);box-shadow:0 8px 32px rgba(245,158,11,.2)}
.lp-out.ob{background:linear-gradient(145deg,#eff6ff,#dbeafe);box-shadow:0 8px 32px rgba(37,99,235,.15)}
.lp-out.on{background:linear-gradient(145deg,#f8fafc,#f1f5f9);box-shadow:0 8px 32px rgba(0,0,0,.07)}
.lp-out.or{background:linear-gradient(145deg,#fef2f2,#fee2e2);box-shadow:0 8px 32px rgba(185,28,28,.12)}
.lp-oico{font-size:38px;margin:0 0 10px;color:#d97706}
.lp-out.ob .lp-oico{color:#2563eb}
.lp-out.on .lp-oico{color:#94a3b8}
.lp-out.or .lp-oico{color:#dc2626}
.lp-opl{font-size:24px;font-weight:800;margin:0 0 6px;color:#92400e;line-height:1.2}
.lp-out.ob .lp-opl{color:#1d4ed8}
.lp-out.on .lp-opl{color:#0f172a}
.lp-out.or .lp-opl{color:#b91c1c}
.lp-odet{font-size:13px;color:#64748b}

/* ── Reset button ── */
.lp-rst{
  display:flex;width:100%;margin:12px 0 0;padding:12px;
  border-radius:14px;font-size:14px;font-weight:600;
  color:#64748b;background:white;
  border:1.5px solid #e2e8f0;
  cursor:pointer;align-items:center;justify-content:center;gap:7px;
  transition:all .15s;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
  font-family:'Inter',sans-serif;
}
.lp-rst:hover{background:#f8fafc;color:#0f172a;border-color:#cbd5e1}

/* ── Mobile ── */
@media(max-width:600px){
  .lp-page{padding:12px}
  .lp-logo{width:58px;height:58px}
  .lp-hdr h1{font-size:22px}
  .lp-hdr h1 span{font-size:13px}
  .lp-hdr p{font-size:12px}
  .lp-tab{font-size:14px;padding:13px 8px}
  .lp-badge h3{font-size:15px}
  .lp-badge p{font-size:13px}
  .lp-gnum{font-size:12px}
  .lp-gcmt{font-size:12px}
  .lp-teams{font-size:17px}
  .lp-vs{font-size:14px}
  .lp-note{font-size:13px}
  .lp-meta span,.lp-meta a{font-size:13px}
  .lp-meta i{font-size:15px}
  .lpbw,.lpbl{font-size:15px;padding:14px 10px}
  .lp-oico{font-size:34px}
  .lp-opl{font-size:22px}
  .lp-odet{font-size:13px}
  .lp-rst{font-size:14px;padding:13px}
  .lp-chip{font-size:13px}
}
</style>

const S = {win:{cur:'g14',dec:[]},lose:{cur:'g35',dec:[]}};

function swTab(t) {
  ['win','lose'].forEach(k=>{
    document.getElementById('tb-'+k).className='lp-tab'+(k===t?(k==='win'?' aw':' al'):'');
    document.getElementById('ph-'+k).className='lp-path'+(k===t?' on':'');
  });
}

function pick(t,id,r){
  const n=T[t].nodes[id];
  S[t].dec.push({id,r});
  S[t].cur=n[r];
  draw(t);
  setTimeout(()=>{
    const el=document.getElementById('sk-'+t).lastElementChild;
    el&&el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },120);
}

function reset(t){S[t].dec=[];S[t].cur=T[t].root;draw(t);}

function xs(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function cardTop(n){
  return `<div class="lp-ctop"><span class="lp-gnum">Game #${n.game}</span><span class="lp-gcmt">${xs(n.cmt)}</span></div>
<div class="lp-teams">Loyola WP Club <span class="lp-vs">vs</span> ${xs(n.vs)}</div>
<div class="lp-note">${xs(n.note)}</div>
<div class="lp-meta">
  <span><i class="ti ti-calendar" aria-hidden="true"></i>${xs(n.day)} · ${xs(n.time)}</span>
  <span><i class="ti ti-map-pin" aria-hidden="true"></i><a href="${xs(n.maps)}" target="_blank">${xs(n.venue)}</a></span>
</div>`;
}

function draw(t){
  const stk=document.getElementById('sk-'+t);
  const nodes=T[t].nodes;
  const s=S[t];
  let h='';

  for(const {id,r} of s.dec){
    const n=nodes[id];
    if(!n||n.type==='result')continue;
    const dc=r==='win'?'dw':'dl';
    const chip=r==='win'
      ?'<span class="lp-chip cw"><i class="ti ti-check" aria-hidden="true" style="font-size:11px"></i> Won</span>'
      :'<span class="lp-chip cl"><i class="ti ti-x" aria-hidden="true" style="font-size:11px"></i> Lost</span>';
    h+=`<div class="lp-card ${dc}">${cardTop(n)}${chip}</div>`;
  }

  const cur=nodes[s.cur];
  if(!cur){
    h+='<p style="font-size:13px;color:#64748b;padding:8px 0">Unknown state.</p>';
  } else if(cur.type==='result'){
    h+=`<div class="lp-out ${cur.col} rv">
  <div class="lp-oico"><i class="ti ${cur.ico}" aria-hidden="true"></i></div>
  <div class="lp-opl">${xs(cur.place)}</div>
  <div class="lp-odet">${xs(cur.det)}</div>
</div>
<button class="lp-rst" onclick="reset('${t}')"><i class="ti ti-refresh" aria-hidden="true"></i> Try another path</button>`;
  } else {
    h+=`<div class="lp-card ac rv">
  ${cardTop(cur)}
  <div class="lp-btns">
    <button class="lpbw" onclick="pick('${t}','${cur.id}','win')"><i class="ti ti-trophy" aria-hidden="true"></i> Win</button>
    <button class="lpbl" onclick="pick('${t}','${cur.id}','lose')"><i class="ti ti-x" aria-hidden="true"></i> Lose</button>
  </div>
</div>`;
    if(s.dec.length>0) h+=`<button class="lp-rst" onclick="reset('${t}')"><i class="ti ti-refresh" aria-hidden="true"></i> Reset path</button>`;
  }

  stk.innerHTML=h;
}

swTab('win');
draw('win');
draw('lose');
</script>
